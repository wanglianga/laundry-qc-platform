version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: laundry-qc-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    networks:
      - laundry-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: laundry-qc-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - laundry-network

networks:
  laundry-network:
    driver: bridge

volumes:
  uploads:
  data:
